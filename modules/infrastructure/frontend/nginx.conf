server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Проксирование API запросов на backend
    # BACKEND_URL подставляется через envsubst при старте
    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # Actuator health проксируется тоже (для readiness probe)
    location /actuator/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/actuator/;
    }

    # Статика
    location / {
        try_files $uri $uri/ /index.html;
    }
}
